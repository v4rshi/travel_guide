<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varshi's Travel Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --paper:#FFFFFF;--ink:#1E2027;--ink-soft:#5C5F6B;--accent:#7B85C7;
  --line:#E8E4DC;--card:#FFFFFF;--radius:14px;
  --cat-eats:#C96A41;--cat-coffee:#B98A2E;--cat-shopping:#DB9CAA;--cat-todo:#7B85C7;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{background:var(--paper);color:var(--ink);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;}
.app{display:grid;grid-template-columns:400px 1fr;grid-template-rows:auto 1fr;height:100vh;}
header{
  grid-column:1/-1;display:flex;align-items:flex-end;justify-content:space-between;
  gap:16px;padding:24px 28px 18px;border-bottom:1px solid var(--line);background:var(--paper);flex-wrap:wrap;
}
.brand-block{display:flex;flex-direction:column;gap:6px;}
.city-tabs{display:flex;gap:6px;margin-bottom:4px;}
.city-tab{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;transition:all .15s ease;font-family:inherit;}
.city-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.brand h1{font-weight:700;font-size:34px;line-height:1;margin:0;letter-spacing:-.01em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.plane-icon{flex-shrink:0;transform:rotate(-20deg);margin-top:-2px;}
.brand h1 .accent{color:var(--accent);transition:color .3s ease;}
.brand .tag{font-size:13px;font-weight:400;color:var(--ink-soft);letter-spacing:.04em;margin-top:4px;text-transform:uppercase;}
.stats{font-size:12px;color:var(--ink-soft);white-space:nowrap;padding-bottom:4px;}
.stats b{color:var(--accent);font-weight:600;transition:color .3s ease;}

.sidebar{border-right:1px solid var(--line);background:var(--paper);display:flex;flex-direction:column;min-height:0;}
.controls{padding:14px 18px 12px;border-bottom:1px solid var(--line);}
.info-bar{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border:1px solid var(--line);border-radius:10px;background:var(--card);
  cursor:pointer;margin-bottom:10px;transition:all .15s ease;font-size:12.5px;color:var(--ink-soft);
}
.info-bar:hover{border-color:var(--accent);color:var(--ink);}
.info-bar svg{flex-shrink:0;color:var(--accent);}
.info-bar span{flex:1;}
.info-bar .arrow{color:var(--ink-soft);font-size:14px;}
.search{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;}
.search:focus{border-color:var(--accent);}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center;}
.chip{font-size:11px;letter-spacing:.02em;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;user-select:none;transition:all .15s ease;font-family:inherit;}
.chip.active{color:#fff;border-color:transparent;}
.chip[data-cat="Eats"].active{background:var(--cat-eats);}
.chip[data-cat="Coffee"].active{background:var(--cat-coffee);}
.chip[data-cat="Shopping"].active{background:var(--cat-shopping);}
.chip[data-cat="Things to do"].active{background:var(--cat-todo);}
.chip[data-cat="all"].active{background:var(--ink);}
.chip[data-cat="starred"].active{background:var(--accent);}

.list{overflow-y:auto;padding:8px 12px 24px;flex:1;}
.group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;padding:14px 8px 6px;font-weight:500;}
.group-label[data-cat="Eats"]{color:var(--cat-eats);}
.group-label[data-cat="Coffee"]{color:var(--cat-coffee);}
.group-label[data-cat="Shopping"]{color:var(--cat-shopping);}
.group-label[data-cat="Things to do"]{color:var(--cat-todo);}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin:6px 0;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;}
.card:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(30,32,39,.08);border-color:#D4CDBE;}
.card.selected{border-color:var(--ink);box-shadow:0 6px 18px rgba(30,32,39,.12);}
.card.bookmarked{border-left:3px solid var(--accent);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-top-left{flex:1;min-width:0;}
.card-icons{display:flex;gap:4px;flex-shrink:0;margin-top:2px;}
.icon-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .12s ease;font-size:14px;padding:0;font-family:inherit;}
.icon-btn:hover{background:#f5f3ef;}
.icon-btn.on{color:var(--accent);border-color:var(--accent);background:rgba(123,133,199,.08);}
.icon-btn.visited-on{color:var(--cat-eats);border-color:var(--cat-eats);background:rgba(201,106,65,.08);}
.cat-tag{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:3px;}
.cat-tag[data-cat="Eats"]{color:var(--cat-eats);}
.cat-tag[data-cat="Coffee"]{color:var(--cat-coffee);}
.cat-tag[data-cat="Shopping"]{color:var(--cat-shopping);}
.cat-tag[data-cat="Things to do"]{color:var(--cat-todo);}
.card h3{margin:0 0 3px;font-weight:600;font-size:16px;color:var(--ink);}
.card p{margin:0;font-size:12px;color:var(--ink-soft);line-height:1.4;}
.card .addr{font-size:10.5px;color:#9B9684;}
.visited-badge{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:6px;background:rgba(201,106,65,.12);color:var(--cat-eats);font-weight:600;margin-left:6px;vertical-align:middle;}
.user-note{margin-top:6px;padding:6px 8px;background:#f8f6f2;border-radius:8px;font-size:11.5px;color:var(--ink);line-height:1.4;font-style:italic;display:flex;align-items:flex-start;gap:6px;}
.user-note svg{flex-shrink:0;margin-top:1px;color:var(--ink-soft);}
.card-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{font-size:11px;text-decoration:none;padding:5px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;transition:all .15s ease;font-family:inherit;background:transparent;color:var(--ink-soft);border:1px solid var(--line);cursor:pointer;}
.act-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.act-btn.journal{border-color:var(--cat-eats);color:var(--cat-eats);}
.act-btn.journal:hover{background:var(--cat-eats);color:#fff;}
.photo-thumbs{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.photo-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:13px;}

/* Inline SVG icon helper */
.ico{width:14px;height:14px;display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(30,32,39,.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal h3{margin:0 0 4px;font-size:18px;font-weight:600;}
.modal .modal-sub{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
.modal textarea{width:100%;height:80px;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:13px;color:var(--ink);resize:vertical;outline:none;}
.modal textarea:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
.modal-btns button{font-family:inherit;font-size:13px;padding:8px 16px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink-soft);transition:all .12s ease;}
.modal-btns .save{background:var(--ink);color:#fff;border-color:var(--ink);}
.modal-btns .save:hover{background:var(--accent);border-color:var(--accent);}
.modal-btns .del{color:#c55;border-color:#c55;}
.journal-modal{max-width:600px;}
.journal-section{margin-top:16px;}
.journal-section label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);display:block;margin-bottom:6px;}
.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s ease;color:var(--ink-soft);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone input{display:none;}
.polaroid-grid{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;}
.polaroid{background:#fff;padding:8px 8px 28px;border-radius:4px;box-shadow:0 3px 12px rgba(0,0,0,.12);width:140px;transform:rotate(var(--rot,0deg));transition:transform .2s ease;position:relative;}
.polaroid:hover{transform:rotate(0deg) scale(1.05);z-index:2;}
.polaroid img{width:100%;height:110px;object-fit:cover;border-radius:2px;display:block;}
.polaroid .caption{font-size:10px;color:var(--ink-soft);margin-top:6px;text-align:center;line-height:1.3;min-height:14px;}
.polaroid .del-photo{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.polaroid:hover .del-photo{opacity:1;}
.info-modal{max-width:520px;}
.info-content{font-size:13.5px;color:var(--ink-soft);line-height:1.6;}
.info-content strong{color:var(--ink);font-weight:600;}

#map{width:100%;height:100%;}
.leaflet-popup-content-wrapper{border-radius:12px;background:var(--card);}
.leaflet-popup-content{font-family:'Space Grotesk',sans-serif;margin:12px 14px;}
.pop-cat{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:500;}
.pop-title{font-weight:700;font-size:17px;margin:2px 0 4px;}
.pop-addr{font-size:11px;color:#9B9684;margin-bottom:4px;}
.pop-notes{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}
.pop-actions{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap;}
.pop-link{font-size:11px;text-decoration:none;padding:6px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s ease;}
.pop-link.primary{background:var(--ink);color:#fff;}
.pop-link.primary:hover{background:var(--accent);}
.pop-link.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.pop-link.ghost:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.my-pin{border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.30);border:2px solid #fff;}
.my-pin span{transform:rotate(45deg);font-size:10px;}

/* Mobile map toggle button */
.map-toggle{display:none;}

@media(max-width:860px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:100vh;}
  .sidebar{border-right:none;}
  #map{display:none;position:fixed;inset:0;z-index:5000;height:100vh!important;}
  #map.map-open{display:block;}
  .map-toggle{
    display:flex;align-items:center;gap:6px;
    position:fixed;bottom:20px;right:20px;z-index:4999;
    background:var(--ink);color:#fff;border:none;border-radius:999px;
    padding:12px 20px;font-family:inherit;font-size:13px;font-weight:600;
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);
    transition:background .15s ease;
  }
  .map-toggle:hover{background:var(--accent);}
  .map-close{
    display:none;position:fixed;top:16px;right:16px;z-index:5001;
    background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:999px;
    padding:10px 18px;font-family:inherit;font-size:13px;font-weight:600;
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);
    align-items:center;gap:6px;
  }
  .map-close.show{display:flex;}
  .brand h1{font-size:24px;}
  .polaroid{width:110px;padding:6px 6px 22px;}
  .polaroid img{height:85px;}
}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#D4CDBE;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand-block">
      <div class="city-tabs" id="cityTabs"></div>
      <div class="brand">
        <h1>
          <svg class="plane-icon" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg>
          CURATED <span class="accent" id="cityTitle">COPENHAGEN</span>
        </h1>
        <div class="tag">VARSHI'S GUIDE TO CITIES AROUND THE WORLD</div>
      </div>
    </div>
    <div class="stats"><b id="countShown">0</b> of <span id="countTotal">0</span> spots shown</div>
  </header>
  <div class="sidebar">
    <div class="controls">
      <div class="info-bar" id="infoBar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <span>For tips on navigating <strong id="infoCity">Copenhagen</strong>, tap here</span>
        <span class="arrow">&rsaquo;</span>
      </div>
      <input class="search" id="search" type="text" placeholder="Search by name, address, or note..."/>
      <div class="filter-row" id="chips">
        <div class="chip active" data-cat="all">All</div>
        <div class="chip" data-cat="Eats">Eats</div>
        <div class="chip" data-cat="Coffee">Coffee</div>
        <div class="chip" data-cat="Shopping">Shopping</div>
        <div class="chip" data-cat="Things to do">Things to do</div>
        <div class="chip" data-cat="starred">Starred</div>
      </div>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- Mobile map buttons -->
<button class="map-toggle" id="mapToggle" onclick="openMobileMap()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
  Map
</button>
<button class="map-close" id="mapClose" onclick="closeMobileMap()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  Close map
</button>

<!-- Note modal -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <h3 id="noteModalTitle">Add a note</h3>
    <div class="modal-sub" id="noteModalSub"></div>
    <textarea id="noteModalText" placeholder="Your notes..."></textarea>
    <div class="modal-btns">
      <button class="del" id="noteModalDel">Delete note</button>
      <button onclick="closeModal('noteModal')">Cancel</button>
      <button class="save" id="noteModalSave">Save</button>
    </div>
  </div>
</div>
<!-- Journal modal -->
<div class="modal-overlay" id="journalModal">
  <div class="modal journal-modal">
    <h3 id="journalTitle">My visit</h3>
    <div class="modal-sub" id="journalSub"></div>
    <div class="journal-section">
      <label>What I loved</label>
      <textarea id="journalText" placeholder="Write about your experience..."></textarea>
    </div>
    <div class="journal-section">
      <label>Photos</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="photoInput" accept="image/*" multiple/>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Tap to upload photos
      </div>
      <div class="polaroid-grid" id="polaroidGrid"></div>
    </div>
    <div class="modal-btns">
      <button onclick="closeModal('journalModal')">Close</button>
      <button class="save" id="journalSave">Save</button>
    </div>
  </div>
</div>
<!-- Info modal -->
<div class="modal-overlay" id="infoModal">
  <div class="modal info-modal">
    <h3 id="infoModalTitle">Getting around</h3>
    <div class="info-content" id="infoContent"></div>
    <div class="modal-btns" style="margin-top:18px;"><button onclick="closeModal('infoModal')">Close</button></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- SVG icon templates (no emojis) ---
const IC={
  pencil:'<svg class="ico" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  camera:'<svg class="ico" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  note:'<svg class="ico" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
};

const CITIES={
  copenhagen:{
    label:"Copenhagen",center:[55.68,12.575],zoom:13,accent:"#7B85C7",
    info:`<strong>Getting around</strong><br>Copenhagen is incredibly bike-friendly. Rent a <strong>Donkey Republic</strong> bike via the app and pick one up from any hub across the city. The S-tog metro and bus network cover everything else.<br><br><strong>Neighborhoods</strong><br>The city center (Indre By) has most museums and shopping. <strong>N&oslash;rrebro</strong> is where the best food, coffee, and vintage stores cluster. <strong>Vesterbro</strong> has the Meatpacking District (K&oslash;dbyen) with bars and nightlife. <strong>Christianshavn</strong> is perfect for canal-side walks. <strong>Refshalee&oslash;en</strong> is the industrial island with Reffen food trucks and Lille Bakery.<br><br><strong>Tips</strong><br>A Copenhagen Card covers most museums and all public transit. Restaurants fill up fast on weekends, so book ahead for sit-down dinners. Most bakeries sell out of their best pastries by noon.`,

0392, "address": "Knippelsbrogade 5, 1411 Copenhagen", "notes": "Natural wine and open sandwiches under a bridge by the canal. Casual and cheap by Copenhagen standards."}, {"category": "Eats", "name": "Ruby", "lat": 55.676101, "lng": 12.577378, "address": "Nybrogade 10, 1203 Copenhagen", "notes": "Copenhagen institution in a historic townhouse off Gammel Strand. Try the Butt Naked Old Fashioned. Seasonal cocktail specials."}, {"category": "Eats", "name": "Selma", "lat": 55.697563, "lng": 12.5761, "address": "Classensgade 18, 2100 Copenhagen", "notes": "Best smørrebrød in town per locals. Michelin Bib Gourmand. Try the blackcurrant herring. 5-7 course curated menus available."}, {"category": "Eats", "name": "Smørrebrød & kanelsnegle", "lat": 55.67790697721684, "lng": 12.570792633767068, "address": "Citywide, Copenhagen", "notes": "Open-faced sandwiches and cinnamon buns are essential Copenhagen eating. Find at any cafe."}, {"category": "Eats", "name": "Tata Bar at Hotel Sanders", "lat": 55.679602, "lng": 12.585247, "address": "Tordenskjoldsgade 15, 1055 Copenhagen", "notes": "Award-winning cocktail bar with mid-century Orient Express-style interiors. A classy end to an evening, near the Royal Danish Theatre."}, {"category": "Eats", "name": "The Library Bar", "lat": 55.672925, "lng": 12.568908, "address": "Bernstorffsgade 4, 1577 Copenhagen", "notes": "Old-school jazz bar inside Copenhagen Plaza hotel near Central Station. Chesterfield armchairs, live jazz, cigars."}, {"category": "Eats", "name": "Vækst", "lat": 55.679161, "lng": 12.570867, "address": "Sankt Peders Stræde 34, 1453 Copenhagen", "notes": "Nordic vegetables-forward menu inside a stunning two-story greenhouse in the Latin Quarter. Vegetarian dishes highlighted on the menu."}, {"category": "Eats", "name": "Donda Deli", "lat": 55.672856, "lng": 12.5926, "address": "Prinsessegade 55, 1422 Copenhagen", "notes": "Latin American small plates and natural wines. Cozy pink-walled vibe in Christianshavn."}, {"category": "Things to do", "name": "Kissing Bridge", "lat": 55.660706, "lng": 12.579634, "address": "Bryggebroen, 2300 Copenhagen", "notes": "Took 7 years to build - the two halves kiss in the middle. Busiest bike bridge in the city."}, {"category": "Things to do", "name": "Krøyers Plads", "lat": 55.674343, "lng": 12.59322, "address": "Krøyers Plads, 1439 Copenhagen", "notes": "Waterfront square in Christianshavn continuing the historic warehouse structure. Wood deck for lounging and sea swimming. Broens Gadekøkken food market right next door."}, {"category": "Things to do", "name": "Sidewalk trampolines", "lat": 55.660933, "lng": 12.579098, "address": "Islands Brygge, 2300 Copenhagen", "notes": "Four tiny trampolines built into the harbor sidewalk near the Kissing Bridge."}, {"category": "Things to do", "name": "Cisterns underground gallery", "lat": 55.675712, "lng": 12.525885, "address": "Søndermarken 1, 2000 Frederiksberg", "notes": "Old water cisterns converted into an art gallery. 100% humidity, always cold, often flooded floors."}, {"category": "Things to do", "name": "Copenhill ski slope", "lat": 55.660001, "lng": 12.579291, "address": "Vindmøllevej 6, 2300 Copenhagen", "notes": "Ski down a rooftop power plant on artificial turf. Apres ski bar at the top."}, {"category": "Eats", "name": "Curfew", "lat": 55.671757, "lng": 12.555789, "address": "Vesterbrogade 69, 1620 Copenhagen", "notes": "1920s speakeasy entered through a bookcase doorway. Book well ahead - seats go fast. Great date night spot."}, {"category": "Eats", "name": "Hanzo", "lat": 55.672127, "lng": 12.553586, "address": "Værnedamsvej 9, 1619 Copenhagen", "notes": "Asian-European fusion on Værnedamsvej - Copenhagen's Paris street. Sharing plates, bao, dumplings, tempura."}, {"category": "Eats", "name": "Höst", "lat": 55.686166, "lng": 12.571504, "address": "Nørre Farimagsgade 41, 1364 Copenhagen", "notes": "Nordic tasting menus (3 or 5 course) focused on seasonal vegetables. Award-winning interior."}, {"category": "Eats", "name": "Köd", "lat": 55.672004, "lng": 12.555257, "address": "Vesterbrogade 18, 1620 Copenhagen", "notes": "Steakhouse on Vesterbrogade with an unlimited cuts concept for groups. Great wine list."}, {"category": "Eats", "name": "Kødbyens Fiskebar", "lat": 55.666483, "lng": 12.553143, "address": "Flæsketorvet 100, 1711 Copenhagen", "notes": "Celebrated seafood restaurant in the Meatpacking District. Oysters and crayfish are the standouts."}, {"category": "Eats", "name": "Lidkoeb", "lat": 55.671595, "lng": 12.555169, "address": "Vesterbrogade 72B, 1620 Copenhagen", "notes": "Three-story bar in an old apothecary in Vesterbro. Cozy fireplace nooks, whiskey bars, and great aquavit cocktails."}, {"category": "Eats", "name": "Mikkeller HQ", "lat": 55.666908, "lng": 12.550231, "address": "Skelbækgade 29, 1717 Copenhagen", "notes": "Iconic Copenhagen craft brewery's HQ bar on Skelbækgade - bodega-style hangout with rotating taps. Also check out nearby Warpigs brewpub."}, {"category": "Eats", "name": "Noho", "lat": 55.666395, "lng": 12.552038, "address": "Flæsketorvet 41, 1711 Copenhagen", "notes": "Buzzy Meatpacking District bar popular with creative types. Neon signs, pink floral ceiling, Nordic Mules."}, {"category": "Eats", "name": "Prolog Coffee", "lat": 55.668213, "lng": 12.558759, "address": "Høkerboderne 16, 1712 Copenhagen", "notes": "Specialty coffee roaster in the Meatpacking District. One of the few places in Copenhagen that sells indie magazines. Good Sunday spot."}, {"category": "Eats", "name": "Warpigs Brewpub", "lat": 55.667949, "lng": 12.553675, "address": "Flæsketorvet 25-37, 1711 Copenhagen", "notes": "State-of-the-art brewery in the Meatpacking District with burgers. Right next to Mikkeller HQ."}, {"category": "Eats", "name": "Andra", "lat": 55.689543, "lng": 12.554232, "address": "Stefansgade 58, 2200 Copenhagen", "notes": "Cozy natural wine bar and eatery on Stefansgade in Nørrebro. Small plates rooted in southern European cooking. Run by a sommelier."}, {"category": "Eats", "name": "Balderdash", "lat": 55.678133, "lng": 12.572199, "address": "Teglgårdsstræde 10, 1452 Copenhagen", "notes": "Wildly inventive cocktail bar hidden behind an unassuming white exterior. Eccentric menu, very hygge atmosphere."}, {"category": "Things to do", "name": "Det Grønne Loppemarked", "lat": 55.690081, "lng": 12.555091, "address": "Assistens Kirkegård, Nørrebrogade, 2200 Copenhagen", "notes": "The Green Flea Market in Nørrebro on Sundays from 10am. Secondhand clothes, vintage lamps, plant-based food stands. Very local vibe."}, {"category": "Eats", "name": "Dzidra", "lat": 55.689431, "lng": 12.554498, "address": "Blågårdsgade 13, 2200 Copenhagen", "notes": "Homely cafe on a quiet Nørrebro residential street. Regularly changing menu leaning Greek or Italian, great cakes and La Cabra coffee."}, {"category": "Eats", "name": "Friheden", "lat": 55.689745, "lng": 12.554325, "address": "Nørrebrogade 50, 2200 Copenhagen", "notes": "Bar and cafe in the heart of Nørrebro by the skatepark. Specialty coffee and natural wines indoors and out."}, {"category": "Eats", "name": "Goldfinch", "lat": 55.690996, "lng": 12.554383, "address": "Elmegade 21, 2200 Copenhagen", "notes": "Cantonese in a date-night setting. Traditional and modern dishes from a former Geranium head chef. Call ahead re vegetarian options."}, {"category": "Eats", "name": "Grød", "lat": 55.690071, "lng": 12.554262, "address": "Jægersborggade 50, 2200 Copenhagen", "notes": "Entire menu built around porridge - sounds odd, genuinely great. Flagship in Nørrebro, 8 branches around the city."}, {"category": "Shopping", "name": "Gågrøn", "lat": 55.690788, "lng": 12.554515, "address": "Jægersborggade 43, 2200 Copenhagen", "notes": "Eco-conscious homewares and beauty on Jægersborggade in Nørrebro."}, {"category": "Eats", "name": "Jatak", "lat": 55.68921, "lng": 12.554301, "address": "Jægersborggade 41, 2200 Copenhagen", "notes": "Asian-influenced 12-course tasting menu. Sit at the kitchen counter. Book well ahead."}, {"category": "Eats", "name": "Kiin Kiin", "lat": 55.690657, "lng": 12.554895, "address": "Guldbergsgade 21, 2200 Copenhagen", "notes": "Only Thai restaurant in Denmark with a Michelin star, held for 10+ years. Closed all of July while chefs travel to Thailand."}, {"category": "Eats", "name": "Sankt Peders Bageri", "lat": 55.679997, "lng": 12.571748, "address": "Larslejsstræde 7, 1451 Copenhagen", "notes": "One of the oldest and most cherished bakeries in town. Cinnamon rolls are heavenly."}, {"category": "Eats", "name": "Steffi", "lat": 55.69032, "lng": 12.555607, "address": "Stefansgade 35, 2200 Copenhagen", "notes": "Natural wine shop - grab a glass and head to Nørrebroparken."}, {"category": "Shopping", "name": "Gammel Kongevej", "lat": 55.674608, "lng": 12.548036, "address": "Gammel Kongevej, 1850 Frederiksberg", "notes": "One of Copenhagen's most charming streets through Frederiksberg - great for a wander, lined with cafes, independent shops, and beautiful architecture."}, {"category": "Eats", "name": "Gensyn Bar", "lat": 55.672573, "lng": 12.540364, "address": "Frederiksberg Allé 24, 1820 Frederiksberg", "notes": "No-frills Frederiksberg bar run by a veteran mixologist. Quality cocktails without the high-end price tag."}, {"category": "Things to do", "name": "Copenhot", "lat": 55.706926, "lng": 12.597093, "address": "Sundkaj 14, 2150 Nordhavn", "notes": "Waterfront sauna with wood hot tubs and sea views in Nordhavn. Try the floating glass sauna."}, {"category": "Eats", "name": "Kōnā", "lat": 55.665089, "lng": 12.534684, "address": "Pasteursvej 14, 1799 Copenhagen", "notes": "Japanese izakaya in Carlsberg Byen. Go downstairs for the special ramen counter."}, {"category": "Things to do", "name": "Copenhagen Contemporary", "lat": 55.693754, "lng": 12.610753, "address": "Refshalevej 173A, 1432 Copenhagen", "notes": "International art center in a former welding hall in Refshaleøen. Works by James Turrell and Yoko Ono plus emerging talent."}, {"category": "Things to do", "name": "GoBoat harbor rental", "lat": 55.660919, "lng": 12.579607, "address": "Islands Brygge 10, 2300 Copenhagen", "notes": "Rent a small electric picnic boat and cruise the Copenhagen harbor at your own pace."}, {"category": "Things to do", "name": "GreenKayak canal cleanup", "lat": 55.672407, "lng": 12.590386, "address": "Christianshavn, 1401 Copenhagen", "notes": "Free kayak trip in exchange for collecting rubbish from the canals. Book ahead as it gets fully booked in summer."}, {"category": "Eats", "name": "Harbor coffee carts", "lat": 55.67789499573167, "lng": 12.577406556768116, "address": "Various harbor locations, Copenhagen", "notes": "Espresso carts parked at harbor viewpoints. Sit on a bench and sip like a local."}, {"category": "Eats", "name": "La Banchina", "lat": 55.692045, "lng": 12.610283, "address": "Refshalevej 141, 1432 Copenhagen", "notes": "Harbour sauna, farm-to-table food, and drinks. Great people-watching. Swim in the harbour right next door."}, {"category": "Eats", "name": "Aamanns Genbo", "lat": 55.697686, "lng": 12.577191, "address": "Øster Farimagsgade 10, 2100 Copenhagen", "notes": "Creative take on smørrebrød and pickled herring. Chef-recommended - try the seafood tasting three ways."}, {"category": "Eats", "name": "Alice", "lat": 55.659929, "lng": 12.579876, "address": "Amagerbrogade 61, 2300 Copenhagen", "notes": "Local secret in Amagerbro. Daily-changing pastries, focaccia sandwiches, and hand-churned ice creams. Try the kouign-amann."}, {"category": "Eats", "name": "Bar Amore", "lat": 55.67442, "lng": 12.525363, "address": "Pile Allé 14, 2000 Frederiksberg", "notes": "Italian small plates and fresh pasta near Frederiksberg. Simple seasonal ingredients - pasta dishes are naturally vegetarian-friendly."}, {"category": "Things to do", "name": "Botanical Gardens", "lat": 55.681954, "lng": 12.58138, "address": "Gothersgade 128, 1123 Copenhagen", "notes": "A green oasis in central Copenhagen with rare cacti and plants from around the world."}, {"category": "Things to do", "name": "Carlsberg Brewery", "lat": 55.665021, "lng": 12.533787, "address": "Gamle Carlsberg Vej 11, 1799 Copenhagen", "notes": "Brewery tour and lunch. Don't miss the elephant gate statues with historic pre-WWII swastika carvings."}, {"category": "Things to do", "name": "Climate change bench", "lat": 55.697869, "lng": 12.576886, "address": "Langelinie, 2100 Copenhagen", "notes": "A bench 1 meter off the ground - the projected sea level rise by 2100. Requires a pull-up to climb on."}, {"category": "Things to do", "name": "Copenpay program", "lat": 55.677575568669255, "lng": 12.572800314716327, "address": "Citywide, Copenhagen", "notes": "City-wide initiative rewarding eco-conscious behavior with free museum entries, bike rentals, meals, and more. No app needed - just show proof of qualifying activity. Runs June-August."}, {"category": "Eats", "name": "Delphine", "lat": 55.659013, "lng": 12.579996, "address": "Holmbladsgade 113, 2300 Copenhagen", "notes": "Greek-inspired small plates - watermelon feta salad and vegetable-forward sharing dishes. Call ahead to confirm options."}, {"category": "Things to do", "name": "Design Museum Danmark", "lat": 55.685031, "lng": 12.588518, "address": "Bredgade 68, 1260 Copenhagen", "notes": "Traces Danish design history interactively. Ends with a giant slide. Open Tue-Sun, 140 DKK adults."}, {"category": "Shopping", "name": "Illums Bolighus", "lat": 55.67864, "lng": 12.576107, "address": "Amagertorv 10, 1160 Copenhagen", "notes": "Enormous Danish design department store on Strøget. Like being in a design museum except you can buy everything."}, {"category": "Eats", "name": "Jade", "lat": 55.673913, "lng": 12.574888, "address": "Stormgade 13, 1555 Copenhagen", "notes": "Asian-fusion on Stormgade. Strong vegetable dishes like steamed snake beans and udon cacio e pepe. Call ahead."}, {"category": "Eats", "name": "Kafeteria SMK", "lat": 55.687097, "lng": 12.580337, "address": "Sølvgade 48, 1307 Copenhagen", "notes": "Coffee shop inside the National Gallery of Denmark. Great classic Danish breakfast - sourdough with whipped butter and comté. Doubles as a reason to visit the gallery."}, {"category": "Shopping", "name": "Knast", "lat": 55.689537, "lng": 12.554216, "address": "Elmegade 14, 2200 Copenhagen", "notes": "Handmade furniture and ceramics shop, plus craft workshops."}, {"category": "Things to do", "name": "Kulturårnet watchtower café", "lat": 55.676131, "lng": 12.578217, "address": "Frederiksholms Kanal, 1220 Copenhagen", "notes": "Café in an old watchtower on a bridge - one of the best sunset spots in the city. Arrive early."}, {"category": "Eats", "name": "Little Green Door", "lat": 55.680411, "lng": 12.580008, "address": "Kristen Bernikows Gade 4, 1105 Copenhagen", "notes": "Asian-themed cocktail bar hidden behind a little green door. Far East inspired menu, cocktail tasting evenings available."}, {"category": "Eats", "name": "Rug Bakery", "lat": 55.66921, "lng": 12.562829, "address": "Tietgensgade 35, 1704 Copenhagen", "notes": "In-house bakehouse at Villa Copenhagen hotel. Cardamom buns, croissants, and chocolate chip cookies. Great for a morning stop."}, {"category": "Things to do", "name": "The Thinker (scrap metal)", "lat": 55.698888, "lng": 12.576228, "address": "Langelinie, 2100 Copenhagen", "notes": "Scrap metal tribute to Rodin's Thinker near the Little Mermaid. Far more interesting than the original."}, {"category": "Shopping", "name": "Tú a Tú", "lat": 55.68954, "lng": 12.554305, "address": "Elmegade 5, 2200 Copenhagen", "notes": "Curated secondhand Scandinavian womenswear - Ganni, Acne Studios."}, {"category": "Things to do", "name": "Valbyparken", "lat": 55.659249, "lng": 12.520054, "address": "Valbyparken, 2500 Valby", "notes": "Overlooked Copenhagen park with 15 themed gardens, a massive playground, and a new beach."}, {"category": "Things to do", "name": "Dragør & Goose Republic", "lat": 55.593904, "lng": 12.669575, "address": "Dragør, 2791 Denmark", "notes": "Charming harbor village with a village of geese coops. Take bus 250S from the city center."}, {"category": "Things to do", "name": "H.C. Andersen House, Odense", "lat": 55.395544, "lng": 10.388764, "address": "Bangs Boder 29, 5000 Odense, Denmark", "notes": "Immersive subterranean museum in Andersen's birthplace designed by Kengo Kuma. 90 min by train. Also see the childhood home and gardens."}, {"category": "Things to do", "name": "Louisiana Museum of Modern Art", "lat": 55.967831, "lng": 12.537548, "address": "Gl Strandvej 13, 3050 Humlebæk, Denmark", "notes": "45 min from Copenhagen by train. Includes a Yayoi Kusama infinity room. Take train to Humlebæk."}, {"category": "Things to do", "name": "Møns Klint cliffs", "lat": 55.007438, "lng": 12.280607, "address": "Møns Klint, 4791 Borre, Denmark", "notes": "Dramatic white chalk cliffs on a UNESCO-listed island. Dark skies for stargazing at night. About 2 hours from Copenhagen by car."}, {"category": "Things to do", "name": "Ordrupgaard", "lat": 55.770754, "lng": 12.54072, "address": "Vilvordevej 110, 2920 Charlottenlund, Denmark", "notes": "Underrated world-class museum in Jægersborg Forest, 5 miles north of the city. Danish and French 19th-century art, sculpture park, and a Zaha Hadid extension. Also check if Finn Juhl's house is open."}, {"category": "Things to do", "name": "Rebild National Park", "lat": 56.829072, "lng": 9.560159, "address": "Rebild National Park, 9520 Skørping, Denmark", "notes": "Purple heather fields and a crooked Troll Forest in North Jutland. About a 4-hour drive."}, {"category": "Eats", "name": "Skærsøgaard", "lat": 55.490591, "lng": 9.469941, "address": "Skærsøvej 6, 6000 Kolding, Denmark", "notes": "Denmark's first authorized winery near Kolding in southern Denmark. Organic wines."}, {"category": "Things to do", "name": "Viking Ship Museum, Roskilde", "lat": 55.643685, "lng": 12.080327, "address": "Vindeboder 12, 4000 Roskilde, Denmark", "notes": "See 1,000-year-old Viking ships and sail a reconstructed one on the fjord."}]
  },
  stockholm:{
    label:"Stockholm",center:[59.3293,18.0686],zoom:13,accent:"#C27168",
    info:`<strong>Getting around</strong><br>Stockholm&rsquo;s metro (Tunnelbana) is fast and covers the whole city. Many stations have incredible art installations worth seeing on their own. The <strong>SL Access card</strong> works on metro, buses, and ferries.<br><br><strong>Neighborhoods</strong><br><strong>Gamla Stan</strong> is the medieval old town with cobblestone streets and Caf&eacute; Schweizer. <strong>Djurg&aring;rden</strong> is the museum island (Vasa, ABBA, Viking Museum). <strong>S&ouml;dermalm</strong> is the hipster quarter with Hermans and great views. <strong>&Ouml;stermalm</strong> has Svenskt Tenn and upscale shopping.<br><br><strong>Tips</strong><br>The <strong>Djurg&aring;rden ferry</strong> from Slussen is the most scenic way to reach the museums. Fika (coffee + pastry break) is non-negotiable. Try a kanelbulle (cinnamon bun) at Vete-Katten.`,
    places:[{"category": "Coffee", "name": "Vete-Katten", "lat": 59.3342047, "lng": 18.0586011, "address": "Kungsgatan 55, 111 22 Stockholm", "notes": "Classic Swedish fika spot, try the princess cake"}, {"category": "Things to do", "name": "Vasa Museum", "lat": 59.3280233, "lng": 18.0913964, "address": "Galärvarvsvägen 14, 115 21 Stockholm", "notes": "17th century warship, must-see"}, {"category": "Things to do", "name": "ABBA The Museum", "lat": 59.3250909, "lng": 18.0967807, "address": "Djurgårdsvägen 68, 115 21 Stockholm", "notes": "Interactive music museum"}, {"category": "Things to do", "name": "The Viking Museum", "lat": 59.326643, "lng": 18.0951796, "address": "Djurgårdsvägen 15, 115 21 Stockholm", "notes": "Immersive Viking Age experience with a dark ride"}, {"category": "Shopping", "name": "Svenskt Tenn", "lat": 59.3323876, "lng": 18.0790962, "address": "Strandvägen 5, 114 51 Stockholm", "notes": "Iconic Swedish design store, Josef Frank prints"}, {"category": "Eats", "name": "Hermans", "lat": 59.3175886, "lng": 18.0839872, "address": "Fjällgatan 23B, 116 28 Stockholm", "notes": "Vegetarian buffet with incredible Stockholm views"}, {"category": "Coffee", "name": "Café Schweizer", "lat": 59.3260983, "lng": 18.0688496, "address": "Västerlånggatan 9, 111 29 Stockholm", "notes": "In Gamla Stan, great cinnamon buns and shrimp sandwiches"}, {"category": "Eats", "name": "Stikki Nikki", "lat": 59.3367119, "lng": 18.0588783, "address": "Drottninggatan 90B, 111 36 Stockholm", "notes": "Best ice cream in Stockholm, try brown butter flavor"}]
  },
  dubai:{
    label:"Dubai",center:[25.18,55.26],zoom:12,accent:"#B98A2E",
    info:`<strong>Getting around</strong><br>The <strong>Dubai Metro</strong> (Red and Green lines) connects major hubs. For Al Quoz and Alserkal, you will need a taxi or ride-hail (Careem/Uber work great). RTA buses and the Dubai Tram fill gaps.<br><br><strong>Neighborhoods</strong><br><strong>Al Fahidi / Bastakiya</strong> is old Dubai with wind towers, the Coffee Museum, and galleries. <strong>Al Quoz / Alserkal Avenue</strong> is the creative district with Nightjar, Cassette, and galleries. <strong>Downtown</strong> has the Mall, Burj Khalifa, and polished cafes like RX and Arabica. <strong>Dubai Hills</strong> is newer with Avatara and parks.<br><br><strong>Tips</strong><br>Visit outdoor spots early morning or evening, especially October through March. Alserkal Avenue is best on weekdays when it is quieter. Friday brunch is a Dubai institution. Most restaurants deliver via Talabat/Deliveroo if you prefer staying in.`,
    places:[{"category": "Coffee", "name": "Nightjar Coffee Roasters", "lat": 25.1427285, "lng": 55.2248847, "address": "Alserkal Avenue, Warehouse G62, Al Quoz, Dubai", "notes": "Specialty roastery in the arts district"}, {"category": "Things to do", "name": "Mirzam Chocolate Factory", "lat": 25.1636061, "lng": 55.2375927, "address": "Al Ghurair Warehouse, 4th St, Al Quoz 3, Dubai", "notes": "Bean-to-bar chocolate maker, try the hot chocolate"}, {"category": "Things to do", "name": "Al Fahidi Historical Neighbourhood", "lat": 25.2642363, "lng": 55.3002643, "address": "Al Fahidi, Bur Dubai", "notes": "Old Dubai wind-tower houses, galleries, and cafes"}, {"category": "Things to do", "name": "Dubai Coffee Museum", "lat": 25.2637125, "lng": 55.3001219, "address": "Villa 44, Al Fahidi Historical District, Dubai", "notes": "Try the free Ethiopian and Arabic coffee"}, {"category": "Coffee", "name": "RX Coffee Apothecary", "lat": 25.1968778, "lng": 55.2796731, "address": "Dubai Mall, Downtown Dubai", "notes": "Sleek apothecary-style cafe"}, {"category": "Coffee", "name": "% Arabica", "lat": 25.1970106, "lng": 55.278802, "address": "Dubai Mall, Financial Center Rd, Downtown Dubai", "notes": "Minimalist Kyoto-born coffee chain"}, {"category": "Eats", "name": "Chatori Gali", "lat": 25.1164117, "lng": 55.2040773, "address": "Al Raha Building, Al Barsha 1, Dubai", "notes": "Indian street food, the jalebi is a must"}, {"category": "Eats", "name": "Avatara", "lat": 25.1075171, "lng": 55.2401753, "address": "Dubai Hills Business Park 1, Dubai", "notes": "Michelin-starred vegetarian Indian fine dining"}, {"category": "Eats", "name": "Farzi Cafe", "lat": 25.2079, "lng": 55.2617, "address": "City Walk, Al Safa St, Dubai", "notes": "Modern Indian bistro and molecular mixology"}, {"category": "Eats", "name": "Cassette", "lat": 25.1435656, "lng": 55.2232672, "address": "The Courtyard, 4B St, Al Quoz 1, Dubai", "notes": "French bistro meets creative hub, great brunch"}]
  }

const CAT_COLORS={"Eats":"#C96A41","Coffee":"#B98A2E","Shopping":"#DB9CAA","Things to do":"#7B85C7"};
const map=L.map('map',{zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',maxZoom:19}).addTo(map);

function makeIcon(c){const cl=CAT_COLORS[c]||'#1E2027';return L.divIcon({className:'',html:`<div class="my-pin" style="background:${cl}"><span>&bull;</span></div>`,iconSize:[22,22],iconAnchor:[11,22],popupAnchor:[0,-20]});}
function dirUrl(p){return`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}&travelmode=walking`;}
function mapUrl(p){return`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// Mobile map toggle
function openMobileMap(){document.getElementById('map').classList.add('map-open');document.getElementById('mapClose').classList.add('show');document.getElementById('mapToggle').style.display='none';setTimeout(()=>map.invalidateSize(),100);}
function closeMobileMap(){document.getElementById('map').classList.remove('map-open');document.getElementById('mapClose').classList.remove('show');document.getElementById('mapToggle').style.display='';}

// Storage
function sk(ck,pid,f){return`curated_${ck}_${pid}_${f}`;}
function getNote(ck,pid){return localStorage.getItem(sk(ck,pid,'note'))||'';}
function setNote(ck,pid,v){v?localStorage.setItem(sk(ck,pid,'note'),v):localStorage.removeItem(sk(ck,pid,'note'));}
function isBookmarked(ck,pid){return localStorage.getItem(sk(ck,pid,'star'))==='1';}
function toggleBookmark(ck,pid){const k=sk(ck,pid,'star');localStorage.getItem(k)==='1'?localStorage.removeItem(k):localStorage.setItem(k,'1');}
function isVisited(ck,pid){return localStorage.getItem(sk(ck,pid,'visited'))==='1';}
function toggleVisited(ck,pid){const k=sk(ck,pid,'visited');localStorage.getItem(k)==='1'?localStorage.removeItem(k):localStorage.setItem(k,'1');}
function getJournal(ck,pid){return localStorage.getItem(sk(ck,pid,'journal'))||'';}
function setJournal(ck,pid,v){v?localStorage.setItem(sk(ck,pid,'journal'),v):localStorage.removeItem(sk(ck,pid,'journal'));}

// IndexedDB for photos
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('curated_photos',1);r.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e);});}
function addPhoto(ck,pid,dataUrl,caption){return new Promise((res,rej)=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').add({city:ck,place:pid,data:dataUrl,caption:caption||'',ts:Date.now()});tx.oncomplete=()=>res();tx.onerror=e=>rej(e);});}
function getPhotos(ck,pid){return new Promise((res,rej)=>{const tx=db.transaction('photos','readonly');const all=tx.objectStore('photos').getAll();all.onsuccess=()=>{res(all.result.filter(p=>p.city===ck&&p.place===pid).sort((a,b)=>a.ts-b.ts));};all.onerror=e=>rej(e);});}
function deletePhoto(id){return new Promise((res,rej)=>{const tx=db.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e);});}
function resizeImage(file,maxW=800){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const ratio=Math.min(maxW/img.width,maxW/img.height,1);c.width=img.width*ratio;c.height=img.height*ratio;c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',0.75));};img.src=e.target.result;};r.readAsDataURL(file);});}

let currentCityKey=Object.keys(CITIES)[0],activeCat='all',markers={},selectedId=null,starOnly=false;
let journalCk=null,journalPid=null;
const listEl=document.getElementById('list'),searchEl=document.getElementById('search'),
      chipsEl=document.getElementById('chips'),cityTabsEl=document.getElementById('cityTabs'),
      cityTitleEl=document.getElementById('cityTitle');

function setAccent(c){document.documentElement.style.setProperty('--accent',c);document.documentElement.style.setProperty('--cat-todo',c);}
function buildCityTabs(){
  cityTabsEl.innerHTML='';
  Object.keys(CITIES).forEach(k=>{const t=document.createElement('div');t.className='city-tab'+(k===currentCityKey?' active':'');t.textContent=CITIES[k].label;t.onclick=()=>switchCity(k);cityTabsEl.appendChild(t);});
}
function switchCity(k){
  currentCityKey=k;selectedId=null;activeCat='all';starOnly=false;searchEl.value='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.cat==='all'));
  const city=CITIES[k];
  cityTitleEl.textContent=city.label.toUpperCase();
  document.title=`Curated ${city.label} — Varshi's Travel Guide`;
  document.getElementById('infoCity').textContent=city.label;
  setAccent(city.accent);buildCityTabs();loadMarkers();
  map.setView(city.center,city.zoom);render();
}
function loadMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  CITIES[currentCityKey].places.forEach((p,i)=>{
    p._id=i;const m=L.marker([p.lat,p.lng],{icon:makeIcon(p.category)});
    const nh=p.notes?`<div class="pop-notes">${p.notes}</div>`:'';
    m.bindPopup(`<div class="pop-cat" style="color:${CAT_COLORS[p.category]||'#1E2027'}">${p.category}</div><div class="pop-title">${p.name}</div><div class="pop-addr">${p.address}</div>${nh}<div class="pop-actions"><a class="pop-link primary" href="${dirUrl(p)}" target="_blank" rel="noopener">Directions</a><a class="pop-link ghost" href="${mapUrl(p)}" target="_blank" rel="noopener">Google Maps</a></div>`);
    m.on('click',()=>selectCard(p._id));markers[i]=m;
  });
}
function matches(p,q,cat){
  if(starOnly&&!isBookmarked(currentCityKey,p._id))return false;
  if(cat!=='all'&&cat!=='starred'&&p.category!==cat)return false;
  if(!q)return true;
  return(p.name+' '+p.address+' '+p.notes+' '+getNote(currentCityKey,p._id)).toLowerCase().includes(q);
}

async function render(){
  const places=CITIES[currentCityKey].places,q=searchEl.value.trim().toLowerCase();
  const visible=places.filter(p=>matches(p,q,activeCat));
  Object.values(markers).forEach(m=>map.removeLayer(m));
  visible.forEach(p=>markers[p._id].addTo(map));
  document.getElementById('countShown').textContent=visible.length;
  document.getElementById('countTotal').textContent=places.length;
  listEl.innerHTML='';
  if(!visible.length){listEl.innerHTML='<div class="empty">Nothing matches. Try a different search or filter.</div>';return;}
  const groups={};visible.forEach(p=>{groups[p.category]=groups[p.category]||[];groups[p.category].push(p);});
  for(const cat of['Eats','Coffee','Shopping','Things to do']){
    if(!groups[cat])continue;
    const lbl=document.createElement('div');lbl.className='group-label';lbl.dataset.cat=cat;
    lbl.textContent=`${cat} — ${groups[cat].length}`;listEl.appendChild(lbl);
    for(const p of groups[cat]){
      const ck=currentCityKey,pid=p._id;
      const bm=isBookmarked(ck,pid),vis=isVisited(ck,pid),un=getNote(ck,pid),jn=getJournal(ck,pid);
      let photos=[];try{photos=await getPhotos(ck,pid);}catch(e){}
      const card=document.createElement('div');
      card.className='card'+(pid===selectedId?' selected':'')+(bm?' bookmarked':'');
      card.dataset.cat=p.category;card.dataset.id=pid;
      let thumbsHtml='';
      if(photos.length)thumbsHtml='<div class="photo-thumbs">'+photos.slice(0,4).map(ph=>`<img class="photo-thumb" src="${ph.data}" alt="">`).join('')+(photos.length>4?`<span style="font-size:11px;color:var(--ink-soft);align-self:center">+${photos.length-4}</span>`:'')+'</div>';
      card.innerHTML=`
        <div class="card-top"><div class="card-top-left">
          <div class="cat-tag" data-cat="${p.category}">${p.category}</div>
          <h3>${p.name}${vis?'<span class="visited-badge">Visited</span>':''}</h3>
          <p class="addr">${p.address}</p>
          ${p.notes?`<p>${p.notes}</p>`:''}
          ${un?`<div class="user-note">${IC.note} ${un}</div>`:''}
          ${jn?`<div class="user-note">${IC.pencil} ${jn}</div>`:''}
          ${thumbsHtml}
        </div><div class="card-icons">
          <button class="icon-btn${bm?' on':''}" data-action="star" title="Bookmark">&starf;</button>
          <button class="icon-btn${vis?' visited-on':''}" data-action="visited" title="Mark visited">&check;</button>
        </div></div>
        <div class="card-actions">
          <a class="act-btn" href="${dirUrl(p)}" target="_blank" rel="noopener">Directions</a>
          <button class="act-btn" data-action="note">${IC.pencil} ${un?'Edit':'Add'} note</button>
          ${vis?`<button class="act-btn journal" data-action="journal">${IC.camera} ${photos.length?'View':'Add'} memories</button>`:''}
        </div>`;
      card.querySelector('a.act-btn').addEventListener('click',e=>e.stopPropagation());
      card.querySelector('[data-action="star"]').addEventListener('click',e=>{e.stopPropagation();toggleBookmark(ck,pid);render();});
      card.querySelector('[data-action="visited"]').addEventListener('click',e=>{e.stopPropagation();toggleVisited(ck,pid);render();});
      card.querySelector('[data-action="note"]').addEventListener('click',e=>{e.stopPropagation();openNoteModal(p.name,ck,pid);});
      const jBtn=card.querySelector('[data-action="journal"]');
      if(jBtn)jBtn.addEventListener('click',e=>{e.stopPropagation();openJournal(p.name,p.address,ck,pid);});
      card.addEventListener('click',()=>{selectCard(pid);map.flyTo([p.lat,p.lng],15,{duration:.6});markers[pid].openPopup();});
      listEl.appendChild(card);
    }
  }
}
function selectCard(id){selectedId=id;document.querySelectorAll('.card').forEach(c=>c.classList.toggle('selected',Number(c.dataset.id)===id));}
function openNoteModal(name,ck,pid){
  document.getElementById('noteModalTitle').textContent=`Note for ${name}`;
  document.getElementById('noteModalSub').textContent=CITIES[ck].places[pid].address;
  const ta=document.getElementById('noteModalText');ta.value=getNote(ck,pid);
  document.getElementById('noteModal').classList.add('open');ta.focus();
  document.getElementById('noteModalSave').onclick=()=>{setNote(ck,pid,ta.value.trim());closeModal('noteModal');render();};
  document.getElementById('noteModalDel').onclick=()=>{setNote(ck,pid,'');closeModal('noteModal');render();};
}
async function openJournal(name,addr,ck,pid){
  journalCk=ck;journalPid=pid;
  document.getElementById('journalTitle').textContent=`My visit to ${name}`;
  document.getElementById('journalSub').textContent=addr;
  document.getElementById('journalText').value=getJournal(ck,pid);
  document.getElementById('journalModal').classList.add('open');
  await renderPolaroids();
  document.getElementById('journalSave').onclick=()=>{setJournal(ck,pid,document.getElementById('journalText').value.trim());closeModal('journalModal');render();};
}
async function renderPolaroids(){
  const grid=document.getElementById('polaroidGrid');grid.innerHTML='';
  const photos=await getPhotos(journalCk,journalPid);
  const rots=[-3,-1,2,-2,1,3,-1.5,2.5];
  photos.forEach((ph,i)=>{
    const div=document.createElement('div');div.className='polaroid';
    div.style.setProperty('--rot',rots[i%rots.length]+'deg');
    div.innerHTML=`<img src="${ph.data}" alt=""><div class="caption">${ph.caption||''}</div><button class="del-photo" title="Delete">&times;</button>`;
    div.querySelector('.del-photo').onclick=async()=>{await deletePhoto(ph.id);renderPolaroids();};
    grid.appendChild(div);
  });
}
document.getElementById('uploadZone').addEventListener('click',()=>document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change',async e=>{
  for(const f of Array.from(e.target.files)){
    const data=await resizeImage(f);
    const caption=prompt('Caption for this photo (or leave blank):','')||'';
    await addPhoto(journalCk,journalPid,data,caption);
  }
  e.target.value='';await renderPolaroids();
});
document.getElementById('infoBar').addEventListener('click',()=>{
  const city=CITIES[currentCityKey];
  document.getElementById('infoModalTitle').textContent=`Getting around ${city.label}`;
  document.getElementById('infoContent').innerHTML=city.info;
  document.getElementById('infoModal').classList.add('open');
});
chipsEl.addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  if(c.dataset.cat==='starred'){starOnly=true;activeCat='all';}
  else{starOnly=false;activeCat=c.dataset.cat;}
  render();
});
searchEl.addEventListener('input',render);
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('open');}));

openDB().then(()=>{
  setAccent(CITIES[currentCityKey].accent);
  document.getElementById('infoCity').textContent=CITIES[currentCityKey].label;
  buildCityTabs();loadMarkers();
  map.setView(CITIES[currentCityKey].center,CITIES[currentCityKey].zoom);
  render();
});
</script>
</body>
</html>
